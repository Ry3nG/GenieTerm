name: Feature Request / Idea
description: Suggest a new GenieTerm product idea.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
    - type: textarea
      attributes:
          label: Feature description
          description: Describe the workflow in detail, why it matters, and what a good GenieTerm experience would feel like.
      validations:
          required: true
    - type: textarea
      attributes:
          label: Implementation Suggestion
          description: If you have any suggestions on how to design this feature, list them here.
      validations:
          required: false
    - type: textarea
      attributes:
          label: Anything else?
          description: |
              Links? References? Anything that will give us more context about how to deliver your feature!

              Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
      validations:
          required: false
