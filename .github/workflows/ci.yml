name: CI

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review
    workflow_dispatch:

env:
    NODE_VERSION: 22
    GO_VERSION_FILE: go.mod

jobs:
    v1-gate:
        name: V1 gate
        runs-on: ubuntu-latest
        timeout-minutes: 25
        if: github.event.pull_request.draft == false
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: package-lock.json

            - uses: actions/setup-go@v5
              with:
                  go-version-file: ${{ env.GO_VERSION_FILE }}
                  cache-dependency-path: go.sum

            - name: Force Git dependencies to HTTPS
              run: |
                  git config --global url.https://github.com/.insteadof ssh://git@github.com/
                  git config --global url.https://github.com/.insteadof git@github.com:

            - name: Install dependencies
              run: npm ci --no-audit --no-fund
              env:
                  GIT_ASKPASS: "echo"
                  GIT_TERMINAL_PROMPT: "0"

            - name: Runtime dependency audit
              run: npm audit --omit=dev --audit-level=moderate

            - name: TypeScript typecheck
              run: npm exec tsc -- --noEmit

            - name: ESLint
              run: npm run lint

            - name: Format check
              run: npm run format:check

            - name: Vitest suite
              run: npm test -- --run

            - name: Go test suite
              run: go test ./...

            - name: Production build
              run: npm run build:prod

            - name: Preview build
              working-directory: frontend/preview
              run: npx vite build

            - name: Preview visual QA
              timeout-minutes: 6
              run: npm run visual:preview

            - name: Preview interaction QA
              timeout-minutes: 4
              run: npm run interaction:preview
