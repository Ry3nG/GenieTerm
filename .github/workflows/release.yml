name: Release

# Push a tag like v0.4.35 to build and publish a GitHub Release for all platforms.
# Code-signing and notarization are OPTIONAL: they activate only when the matching
# repo secrets are present, so the pipeline produces unsigned builds until you add them.
on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            publish:
                description: "Publish artifacts to a GitHub Release (otherwise dry build)"
                type: boolean
                default: false

permissions:
    contents: write

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: 22
    GO_VERSION_FILE: go.mod

jobs:
    preflight:
        name: Release preflight
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: package-lock.json

            - uses: actions/setup-go@v5
              with:
                  go-version-file: ${{ env.GO_VERSION_FILE }}
                  cache-dependency-path: go.sum

            - name: Force Git dependencies to HTTPS
              run: |
                  git config --global url.https://github.com/.insteadof ssh://git@github.com/
                  git config --global url.https://github.com/.insteadof git@github.com:

            - name: Install dependencies
              run: npm ci --no-audit --no-fund
              env:
                  GIT_ASKPASS: "echo"
                  GIT_TERMINAL_PROMPT: "0"

            - name: Runtime dependency audit
              run: npm audit --omit=dev --audit-level=moderate

            - name: Verify tag matches package version
              if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
              run: |
                  VERSION="$(node -p "require('./package.json').version")"
                  if [ "v${VERSION}" != "${GITHUB_REF_NAME}" ]; then
                    echo "Tag ${GITHUB_REF_NAME} does not match package version v${VERSION}" >&2
                    exit 1
                  fi

            - name: TypeScript typecheck
              run: npm exec tsc -- --noEmit

            - name: ESLint
              run: npm run lint

            - name: Format check
              run: npm run format:check

            - name: Vitest suite
              run: npm test -- --run

            - name: Go test suite
              run: go test ./...

            - name: Production build
              run: npm run build:prod

            - name: Preview build
              working-directory: frontend/preview
              run: npx vite build

            - name: Preview visual QA
              timeout-minutes: 6
              run: npm run visual:preview

            - name: Preview interaction QA
              timeout-minutes: 4
              run: npm run interaction:preview

    build:
        name: Build ${{ matrix.platform }}
        needs: preflight
        runs-on: ${{ matrix.runner }}
        strategy:
            # Don't let one platform's failure abort releases for the others.
            fail-fast: false
            matrix:
                include:
                    - platform: macos
                      runner: macos-latest
                    - platform: linux
                      runner: ubuntu-latest
                    - platform: windows
                      runner: windows-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: package-lock.json

            - uses: actions/setup-go@v5
              with:
                  go-version-file: ${{ env.GO_VERSION_FILE }}
                  cache-dependency-path: go.sum

            - name: Install Task
              uses: arduino/setup-task@v2
              with:
                  version: 3.x
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            # Linux and Windows wavesrv are cross-compiled with `zig cc` (see Taskfile
            # build:server:linux / build:server:windows). macOS uses the native clang.
            - name: Install Zig (CGO toolchain)
              if: matrix.platform != 'macos'
              uses: mlugg/setup-zig@v1
              with:
                  version: 0.13.0

            # electron-builder's pacman target shells out to fpm -> bsdtar to build the
            # Arch package; bsdtar isn't on the ubuntu runner by default.
            - name: Install libarchive-tools (Linux pacman packaging)
              if: matrix.platform == 'linux'
              run: sudo apt-get update && sudo apt-get install -y libarchive-tools

            - name: Force Git dependencies to HTTPS
              run: |
                  git config --global url.https://github.com/.insteadof ssh://git@github.com/
                  git config --global url.https://github.com/.insteadof git@github.com:

            - name: Install dependencies
              run: npm ci --no-audit --no-fund
              env:
                  GIT_ASKPASS: "echo"
                  GIT_TERMINAL_PROMPT: "0"

            - name: Build and package
              # `task package` builds wavesrv + wsh/genie + tsunamiscaffold + frontend, then runs
              # electron-builder. Publishing happens in a separate job after every platform has built.
              run: task package -- --publish never
              env:
                  # The production vite bundle is large; the default ~2GB Node heap OOMs.
                  NODE_OPTIONS: "--max-old-space-size=6144"
                  # Snap packaging requires snapcraft and store credentials. Keep GitHub Release
                  # builds on installable file artifacts until Snap publishing is configured.
                  GENIETERM_LINUX_TARGETS: ${{ matrix.platform == 'linux' && 'zip,deb,rpm,AppImage,pacman' || '' }}
                  # macOS code-signing env (CSC_LINK / APPLE_*) is intentionally NOT set here:
                  # an undefined secret expands to "", and electron-builder treats CSC_LINK=""
                  # as a cert path -> resolves to the repo root -> "<repo> not a file". Builds
                  # are ad-hoc signed (unsigned). To ship signed later, add a step that exports
                  # CSC_LINK / CSC_KEY_PASSWORD / APPLE_* only when those secrets are non-empty.

            - name: Verify macOS package artifact
              if: matrix.platform == 'macos'
              run: task package:verify -- make
              env:
                  GENIETERM_ALLOW_UNSIGNED_MAC: "1"

            - name: Upload package artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: genieterm-${{ matrix.platform }}
                  if-no-files-found: error
                  path: |
                      make/*.AppImage
                      make/*.blockmap
                      make/*.deb
                      make/*.dmg
                      make/*.exe
                      make/*.msi
                      make/*.pacman
                      make/*.rpm
                      make/*.yml
                      make/*.zip

    publish:
        name: Publish GitHub Release
        needs: build
        if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event.inputs.publish == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/download-artifact@v4
              with:
                  path: release-artifacts

            - name: Publish release assets
              run: |
                  set -euo pipefail

                  if [ "${GITHUB_EVENT_NAME}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
                    TAG_NAME="${GITHUB_REF_NAME}"
                  else
                    VERSION="$(node -p "require('./package.json').version")"
                    TAG_NAME="v${VERSION}"
                  fi

                  DUPLICATE_NAMES="$(find release-artifacts -type f -exec basename {} \; | sort | uniq -d)"
                  if [ -n "${DUPLICATE_NAMES}" ]; then
                    echo "Duplicate release asset names found:" >&2
                    echo "${DUPLICATE_NAMES}" >&2
                    exit 1
                  fi

                  mapfile -t ASSETS < <(find release-artifacts -type f | sort)
                  if [ "${#ASSETS[@]}" -eq 0 ]; then
                    echo "No release assets were downloaded" >&2
                    exit 1
                  fi

                  if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
                    gh release upload "${TAG_NAME}" "${ASSETS[@]}" --clobber
                  else
                    gh release create "${TAG_NAME}" "${ASSETS[@]}" \
                      --target "${GITHUB_SHA}" \
                      --title "${TAG_NAME}" \
                      --generate-notes
                  fi
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
