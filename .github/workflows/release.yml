name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 触发条件：推送 v* 标签（如 v1.0.0）
  workflow_dispatch:  # 允许手动触发

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true

    - name: Setup Swift
      run: |
        swift --version
        xcodebuild -version

    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build Rust library (Release)
      run: cargo build --release --lib

    - name: Build Swift app (Release)
      run: |
        cd native/GenieTerm
        swift build -c release

    - name: Prepare app bundle
      run: |
        mkdir -p release

        # Find the built app
        if [ -d "native/GenieTerm/.build/apple/Products/Release/GenieTerm.app" ]; then
          APP_PATH="native/GenieTerm/.build/apple/Products/Release/GenieTerm.app"
        else
          APP_PATH="native/GenieTerm/.build/arm64-apple-macosx/release/GenieTerm.app"
        fi

        # Copy app to release directory
        cp -R "$APP_PATH" release/

        # Copy icon if exists
        if [ -f "assets/AppIcon.icns" ]; then
          mkdir -p "release/GenieTerm.app/Contents/Resources"
          cp assets/AppIcon.icns "release/GenieTerm.app/Contents/Resources/"
        fi

    - name: Create DMG
      run: |
        # Create temporary directory for DMG contents
        mkdir -p dmg_temp
        cp -R release/GenieTerm.app dmg_temp/
        ln -s /Applications dmg_temp/Applications

        # Get version from tag or use date
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION="${GITHUB_REF#refs/tags/v}"
          DMG_NAME="GenieTerm-${VERSION}.dmg"
        else
          DMG_NAME="GenieTerm-$(date +%Y%m%d).dmg"
        fi

        # Create DMG
        hdiutil create -volname "GenieTerm" \
          -srcfolder dmg_temp \
          -ov -format UDZO \
          "release/$DMG_NAME"

        # Clean up
        rm -rf dmg_temp

        echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

    - name: Upload DMG as artifact
      uses: actions/upload-artifact@v3
      with:
        name: GenieTerm-DMG
        path: release/*.dmg

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: release/*.dmg
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload release summary
      run: |
        echo "## 🎉 Build Complete!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- DMG installer: \`$DMG_NAME\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📥 Installation" >> $GITHUB_STEP_SUMMARY
        echo "1. Download the DMG file" >> $GITHUB_STEP_SUMMARY
        echo "2. Open it and drag GenieTerm to Applications" >> $GITHUB_STEP_SUMMARY
        echo "3. Launch from Applications folder" >> $GITHUB_STEP_SUMMARY
