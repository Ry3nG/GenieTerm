name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 触发条件：推送 v* 标签（如 v1.0.0）
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true

    - name: Setup Swift
      run: |
        swift --version
        xcodebuild -version

    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build release package
      run: |
        # Build using our build script
        ./build_release.sh

        # Rename DMG with version if this is a tag
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION="${GITHUB_REF#refs/tags/v}"
          mv release/GenieTerm-*.dmg "release/GenieTerm-${VERSION}.dmg"
        fi

    - name: Upload DMG as artifact
      uses: actions/upload-artifact@v4
      with:
        name: GenieTerm-DMG
        path: release/*.dmg

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: release/*.dmg
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload release summary
      run: |
        echo "## 🎉 Build Complete!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
        ls -lh release/*.dmg | awk '{print "- DMG installer: `" $9 "` (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📥 Installation" >> $GITHUB_STEP_SUMMARY
        echo "1. Download the DMG file" >> $GITHUB_STEP_SUMMARY
        echo "2. Open it and drag GenieTerm to Applications" >> $GITHUB_STEP_SUMMARY
        echo "3. Launch from Applications folder" >> $GITHUB_STEP_SUMMARY
